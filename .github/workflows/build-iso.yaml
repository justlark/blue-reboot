name: Build ISO image

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build container image"]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_iso:
    name: Build and upload ISO
    runs-on: ubuntu-latest

    # Only run when triggered by the daily image build job—not on every push to
    # `main`.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'schedule' &&
       github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: read
      packages: read

    env:
      RCLONE_CONFIG_S3_TYPE: s3
      RCLONE_CONFIG_S3_PROVIDER: ${{ vars.S3_PROVIDER }}
      RCLONE_CONFIG_S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
      RCLONE_CONFIG_S3_REGION: ${{ vars.S3_REGION }}
      RCLONE_CONFIG_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      RCLONE_CONFIG_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: "Install cargo-binstall"
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: "Install just"
        run: cargo binstall just

      - name: "Install nu"
        run: cargo binstall nu

      - name: "Install rclone"
        run: sudo apt-get update && sudo apt-get install --yes rclone

      - name: Pull image and tag for the ISO build
        run: |
          sudo podman pull "ghcr.io/${{ github.repository }}:latest"
          sudo podman tag "ghcr.io/${{ github.repository }}:latest" localhost/blue-reboot:latest

      - name: Build ISO
        run: just build-iso

      - name: Upload ISO to S3
        run: rclone copyto "./output/bootiso/install.iso" "s3:${{ vars.S3_BUCKET }}/blue-reboot.iso" --s3-no-check-bucket --progress
